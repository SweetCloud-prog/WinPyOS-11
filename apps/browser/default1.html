<!DOCTYPE html>
<html>
<head>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        background: #1e1e1e;
        color: white;
        font-family: 'Segoe UI', sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        overflow: hidden;
    }
    .logo {
        font-size: 42px;
        font-weight: 600;
        margin-bottom: 30px;
        background: linear-gradient(135deg, #0078d4, #00b4d8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }
    .search-box {
        width: 580px;
        max-width: 90vw;
        position: relative;
    }
    .search-box input {
        width: 100%;
        height: 46px;
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 23px;
        color: white;
        font-size: 15px;
        padding: 0 50px 0 22px;
        outline: none;
        transition: all 0.2s;
    }
    .search-box input:focus {
        background: rgba(255,255,255,0.1);
        border-color: rgba(0,120,212,0.6);
        box-shadow: 0 0 0 2px rgba(0,120,212,0.15);
    }
    .search-box input::placeholder { color: rgba(255,255,255,0.3); }
    .search-icon {
        position: absolute;
        right: 16px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 18px;
        color: rgba(255,255,255,0.3);
    }
    .shortcuts {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
        margin-top: 40px;
        width: 580px;
        max-width: 90vw;
    }
    .shortcut {
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 12px;
        padding: 16px;
        text-align: center;
        cursor: pointer;
        transition: all 0.15s;
        text-decoration: none;
        color: white;
    }
    .shortcut:hover {
        background: rgba(255,255,255,0.08);
        border-color: rgba(255,255,255,0.12);
        transform: translateY(-1px);
    }
    .shortcut .icon { font-size: 24px; margin-bottom: 8px; }
    .shortcut .label { font-size: 12px; color: rgba(255,255,255,0.6); }
</style>
</head>
<body>
    <div class="logo">WinPy11 Edge</div>
    <div class="search-box">
        <input type="text" placeholder="Search the web..." id="search"
               onkeydown="if(event.key==='Enter')window.location.href='https://www.google.com/search?q='+this.value">
        <span class="search-icon">🔍</span>
    </div>
    <div class="shortcuts">
        <a class="shortcut" href="https://www.google.com">
            <div class="icon">🔍</div><div class="label">Google</div>
        </a>
        <a class="shortcut" href="https://www.youtube.com">
            <div class="icon">▶️</div><div class="label">YouTube</div>
        </a>
        <a class="shortcut" href="https://github.com">
            <div class="icon">💻</div><div class="label">GitHub</div>
        </a>
        <a class="shortcut" href="https://en.wikipedia.org">
            <div class="icon">📚</div><div class="label">Wikipedia</div>
        </a>
    </div>
</body>
</html>
